name: E2E

on:
  pull_request:
    branches: [ main, 'market/**' ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    # A healthy run (build + preview + Playwright) finishes in ~2-3 min. Cap the
    # job so the intermittent GitHub-runner stall on `npm run test:e2e` self-aborts
    # as a failure in minutes instead of sitting for GitHub's 6h default — a hung
    # runner then fails fast and can be re-dispatched rather than blocking forever.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Skip the (slow) Playwright run on DOCS-ONLY changes — the job still runs
      # and reports success so the required "e2e" check is satisfied. Fails SAFE:
      # only an all-docs/ diff skips; anything else runs the full suite.
      - name: Detect non-docs changes
        id: changes
        env:
          EVENT: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -u
          if [ "$EVENT" = "pull_request" ]; then
            git fetch --no-tags origin "$BASE_REF" || true
            range="origin/$BASE_REF...HEAD"
          else
            range="HEAD~1 HEAD"
          fi
          changed=$(git diff --name-only $range 2>/dev/null || true)
          echo "Changed files:"; printf '%s\n' "$changed"
          if [ -z "$changed" ] || printf '%s\n' "$changed" | grep -qvE '^docs/'; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Docs-only change — skipping the Playwright e2e suite."
          fi
      - uses: actions/setup-node@v6
        if: steps.changes.outputs.code == 'true'
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
        if: steps.changes.outputs.code == 'true'
      - run: npx playwright install --with-deps chromium
        if: steps.changes.outputs.code == 'true'
      - run: npm run test:e2e
        if: steps.changes.outputs.code == 'true'
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() && steps.changes.outputs.code == 'true' }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
