name: Secret scan

# Scans the repository (working tree + git history) for committed secrets with
# gitleaks. Uses the CLI directly so it needs no license key. Fails the run on
# any finding (exit code 1).
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so secrets in older commits are caught
      - name: Run gitleaks
        env:
          GITLEAKS_VERSION: 8.21.2
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks detect --source . --redact --no-banner --exit-code 1
